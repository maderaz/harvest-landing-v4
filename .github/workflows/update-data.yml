name: Update Vault Data

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      # Always pin to main, regardless of which branch the repo's default
      # is currently set to. Without this, schedule events were checking
      # out a stale dev branch and the data refresh never landed on the
      # branch Vercel deploys from.
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch data from APIs
        run: node scripts/fetch-data.mjs

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/vaults.json data/history.json data/slugs.json
          if git diff --cached --quiet; then
            echo "No data changes detected."
            exit 0
          fi
          git commit -m "chore: update vault data $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          # Race-safe push: if another commit landed on main between
          # checkout and push, rebase onto it and try once more.
          for attempt in 1 2 3; do
            if git push origin HEAD:main; then
              echo "Pushed on attempt $attempt."
              exit 0
            fi
            echo "Push rejected on attempt $attempt, rebasing on origin/main."
            git fetch origin main
            git rebase origin/main
          done
          echo "Failed to push after retries."
          exit 1
