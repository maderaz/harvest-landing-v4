name: Index Vault Events (Subgraph)

# Subgraph-driven companion to the RPC indexer. Pulls deposit /
# withdraw rows from the Harvest subgraph (one endpoint per chain,
# {chainId} substituted at the URL placeholder) and upserts them
# into vault_events_prod.
#
# SCHEDULE DISABLED: the RPC indexer (index-vault-events.yml) is the
# authoritative source of deposit/withdraw rows for the funnel. It
# resolves the signing EOA (tx.from) so aggregator-routed deposits
# (Portals, 1inch, Zapper, ...) attribute to the user, not the router
# contract. The subgraph's `sender` is the router in that case and uses
# a different log_index, so running it on cron would write a second,
# router-attributed row for the same deposit that reads "External" in
# the feed. Kept here for manual / schema-probe use only (run via the
# Actions "Run workflow" button, or `--probe` locally); re-enable the
# cron below only if the RPC indexer is ever retired.
#
# Runs in a single job (not per-chain matrix) - the subgraph
# handles all chains in one HTTP roundtrip per page.

on:
  # schedule:
  #   - cron: '15 * * * *'
  workflow_dispatch: {}

jobs:
  index:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Index user transactions from subgraph
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/index-vault-events-subgraph.mjs
