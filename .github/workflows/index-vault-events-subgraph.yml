name: Index Vault Events (Subgraph)

# Subgraph-driven companion to the RPC indexer. Pulls deposit /
# withdraw rows from the Harvest subgraph (one endpoint per chain,
# {chainId} substituted at the URL placeholder) and upserts them
# into vault_events_prod. Picks up where the existing rows leave
# off; first run per chain back-fills the trailing 30 days.
#
# Runs in a single job (not per-chain matrix) - the subgraph
# handles all chains in one HTTP roundtrip per page, so parallel
# matrix would just hit the same host harder for no benefit.
#
# Runs every 15 minutes on main, offset by 5 minutes from the RPC
# indexer so the two never collide on Supabase writes.

on:
  schedule:
    - cron: '5-59/15 * * * *'
  workflow_dispatch: {}

jobs:
  index:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Index user transactions from subgraph
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/index-vault-events-subgraph.mjs
