<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Harvest">
  <defs>
    <pattern id="dots" width="8" height="8" patternUnits="userSpaceOnUse">
      <circle cx="1.3" cy="1.3" r="1.1" fill="#191717" fill-opacity="0.10" />
    </pattern>
  </defs>
  <!-- Sunflower Gold rounded-square tile -->
  <rect width="64" height="64" rx="14" fill="#ffb936" />
  <!-- Dark-ink dot raster (the flagship dotted texture) -->
  <rect width="64" height="64" rx="14" fill="url(#dots)" />
  <!-- "H" drawn as bars so it stays crisp + font-independent at 16px -->
  <g fill="#191717">
    <rect x="15" y="17" width="7.5" height="30" rx="1.5" />
    <rect x="33.5" y="17" width="7.5" height="30" rx="1.5" />
    <rect x="15" y="28.25" width="26" height="7.5" rx="1.5" />
    <!-- the pip: a square dot next to the H, on its baseline -->
    <rect x="45.5" y="39.5" width="7.5" height="7.5" rx="2" />
  </g>
</svg>
